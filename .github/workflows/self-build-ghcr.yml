name: "Self-host build → GHCR"

# Build minimal (amd64 uniquement, pas d'ARM, pas de Docker Hub, pas de tests e2e/Slack)
# pour un self-host perso. Pousse vers ghcr.io/<toi>/cal.diy — namespace du fork, pas celui
# de calcom/cal.diy (dont on n'a pas les droits de publication).
#
# Déclenchement manuel : Actions → "Self-host build → GHCR" → Run workflow.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag ou branche à builder"
        required: true
        default: "v6.2.0"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Start temporary Postgres (requis pendant le build)
        run: |
          docker run -d --name database \
            -e POSTGRES_USER=unicorn_user \
            -e POSTGRES_PASSWORD=magical_password \
            -e POSTGRES_DB=calendso \
            postgres:16
          for i in $(seq 1 30); do
            docker exec database pg_isready -U unicorn_user && break
            sleep 2
          done

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=container:database

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/cal.diy:${{ inputs.ref }}
          build-args: |
            NEXT_PUBLIC_WEBAPP_URL=https://cal.hub-ia.fr
            NEXT_PUBLIC_API_V2_URL=https://cal.hub-ia.fr/api/v2
            NEXT_PUBLIC_LICENSE_CONSENT=agree
            DATABASE_URL=postgresql://unicorn_user:magical_password@database:5432/calendso
            DATABASE_DIRECT_URL=postgresql://unicorn_user:magical_password@database:5432/calendso

      - name: Cleanup
        if: always()
        run: docker rm -f database || true
